name: Tsundoku
options:
  bundleIdPrefix: com.joyinc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    INFOPLIST_KEY_CFBundleDisplayName: Tsundoku
    TARGETED_DEVICE_FAMILY: 1
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Tsundoku:
    type: application
    platform: iOS
    sources:
      - path: Tsundoku
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        PRODUCT_BUNDLE_IDENTIFIER: com.joyinc.Tsundoku
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_GOOGLE_BOOKS_API_KEY: $(GOOGLE_BOOKS_API_KEY)
    info:
      path: Tsundoku/Info.plist
      properties:
        GOOGLE_BOOKS_API_KEY: $(GOOGLE_BOOKS_API_KEY)

  TsundokuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TsundokuTests
    dependencies:
      - target: Tsundoku
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joyinc.TsundokuTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Tsundoku.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tsundoku
        BUNDLE_LOADER: $(TEST_HOST)
